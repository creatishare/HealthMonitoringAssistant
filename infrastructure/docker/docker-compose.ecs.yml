# ============================================
# Docker Compose - ECS生产环境配置（无短信功能）
# ============================================
# 用途: 阿里云ECS生产环境部署（不含短信服务）
# 使用方法: docker-compose -f docker-compose.ecs.yml up -d
# ============================================

version: '3.8'

services:
  # ----------------------------------------
  # PostgreSQL 数据库
  # ----------------------------------------
  postgres:
    image: postgres:14-alpine
    container_name: health-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-health}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-health_monitoring}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
      - ./backups:/backups
    networks:
      - health-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-health} -d ${POSTGRES_DB:-health_monitoring}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5432:5432"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ----------------------------------------
  # Redis 缓存/队列
  # ----------------------------------------
  redis:
    image: redis:7-alpine
    container_name: health-redis
    restart: always
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-redis123}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - health-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:6379:6379"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ----------------------------------------
  # 后端 API 服务
  # ----------------------------------------
  backend:
    build:
      context: ../../src/backend
      dockerfile: ../../infrastructure/docker/Dockerfile.backend
    container_name: health-backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      BAIDU_OCR_API_KEY: ${BAIDU_OCR_API_KEY}
      BAIDU_OCR_SECRET_KEY: ${BAIDU_OCR_SECRET_KEY}
      # 禁用短信功能
      SMS_ENABLED: "false"
      # 文件上传配置
      UPLOAD_DIR: ./uploads
      MAX_FILE_SIZE: 5242880
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - health-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ----------------------------------------
  # Worker 定时任务服务（仅内部提醒，不发短信）
  # ----------------------------------------
  worker:
    build:
      context: ../../src/backend
      dockerfile: ../../infrastructure/docker/Dockerfile.worker
    container_name: health-worker
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      # 禁用短信功能
      SMS_ENABLED: "false"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # 启用Worker但禁用短信发送
      ENABLE_REMINDER_WORKER: "true"
      ENABLE_SMS_NOTIFICATION: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - health-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # ----------------------------------------
  # 前端 Web 服务 (Nginx)
  # ----------------------------------------
  web:
    build:
      context: ../../src/frontend
      dockerfile: ../../infrastructure/docker/Dockerfile.frontend
    container_name: health-web
    restart: always
    environment:
      # 构建时注入的环境变量
      VITE_API_BASE_URL: /api
      VITE_APP_NAME: 肾健康助手
      VITE_APP_VERSION: 1.0.0
    depends_on:
      - backend
    networks:
      - health-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # ----------------------------------------
  # Nginx 反向代理
  # ----------------------------------------
  nginx:
    image: nginx:1.24-alpine
    container_name: health-nginx
    restart: always
    ports:
      - "80:80"
      # 如需HTTPS，取消下面注释并配置证书
      # - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      # SSL证书目录（如使用HTTPS）
      # - ../nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
      - backend
    networks:
      - health-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ----------------------------------------
# 数据卷
# ----------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local

# ----------------------------------------
# 网络
# ----------------------------------------
networks:
  health-network:
    driver: bridge
