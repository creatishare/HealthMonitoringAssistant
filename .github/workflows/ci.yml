name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies (Backend)
        working-directory: ./src/backend
        run: npm ci

      - name: Lint Backend
        working-directory: ./src/backend
        run: npm run lint

      - name: Install dependencies (Frontend)
        working-directory: ./src/frontend
        run: npm ci

      - name: Lint Frontend
        working-directory: ./src/frontend
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: health_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies (Backend)
        working-directory: ./src/backend
        run: npm ci

      - name: Run Backend Tests
        working-directory: ./src/backend
        run: npm test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/health_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key

      - name: Install dependencies (Frontend)
        working-directory: ./src/frontend
        run: npm ci

      - name: Run Frontend Tests
        working-directory: ./src/frontend
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Build Backend
        working-directory: ./src/backend
        run: |
          npm ci
          npm run build

      - name: Build Frontend
        working-directory: ./src/frontend
        run: |
          npm ci
          npm run build
